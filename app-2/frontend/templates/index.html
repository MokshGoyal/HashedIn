<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservice Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            padding: 2rem 2rem 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .container {
            padding: 2rem;
            max-width: 1200px;
        }

        .card {
            background-color: var(--surface);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger);
        }
        
        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>MicroDashboard Proxy</h1>
    <div>Gateway Route Active</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('users')">Users</button>
    <button class="tab-btn" onclick="switchTab('products')">Products</button>
    <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
</div>

<div class="container">
    <!-- Users Panel -->
    <div id="users-panel" class="card">
        <h2>Manage Users</h2>
        <div class="form-row">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="u-name" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="u-email" placeholder="john@ex.com">
            </div>
            <div class="input-group">
                <label>Role</label>
                <input type="text" id="u-role" placeholder="Admin">
            </div>
            <button class="btn" onclick="createUser()">Add User</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody id="users-tbody"></tbody>
        </table>
    </div>

    <!-- Products Panel -->
    <div id="products-panel" class="card hidden">
        <h2>Manage Products</h2>
        <div class="form-row">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="p-name" placeholder="Laptop">
            </div>
            <div class="input-group">
                <label>Price</label>
                <input type="number" id="p-price" placeholder="999.99">
            </div>
            <div class="input-group">
                <label>Category</label>
                <input type="text" id="p-category" placeholder="Electronics">
            </div>
            <button class="btn" onclick="createProduct()">Add Product</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Actions</th></tr></thead>
            <tbody id="products-tbody"></tbody>
        </table>
    </div>

    <!-- Orders Panel -->
    <div id="orders-panel" class="card hidden">
        <h2>Manage Orders</h2>
        <div class="form-row">
            <div class="input-group">
                <label>User ID</label>
                <input type="number" id="o-userid" placeholder="1">
            </div>
            <div class="input-group">
                <label>Product ID</label>
                <input type="number" id="o-productid" placeholder="2">
            </div>
            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="o-qty" placeholder="1">
            </div>
            <div class="input-group">
                <label>Status</label>
                <input type="text" id="o-status" placeholder="Pending">
            </div>
            <button class="btn" onclick="createOrder()">Create Order</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>User ID</th><th>Product ID</th><th>Qty</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="orders-tbody"></tbody>
        </table>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('users-panel').classList.add('hidden');
        document.getElementById('products-panel').classList.add('hidden');
        document.getElementById('orders-panel').classList.add('hidden');
        
        document.getElementById(tab + '-panel').classList.remove('hidden');
        if (tab === 'users') loadUsers();
        if (tab === 'products') loadProducts();
        if (tab === 'orders') loadOrders();
    }

    // Generic Fetch Wrapper
    async function apiRequest(endpoint, method='GET', body=null) {
        const options = { method, headers: {'Content-Type': 'application/json'} };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`/api/${endpoint}`, options);
        if (!res.ok) {
            console.error('API Error', await res.text());
        }
        return method === 'GET' ? res.json() : null;
    }

    // Users
    async function loadUsers() {
        const users = await apiRequest('users/users');
        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = '';
        users.forEach(u => {
            tbody.innerHTML += `<tr>
                <td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Del</button></td>
            </tr>`;
        });
    }

    async function createUser() {
        const name = document.getElementById('u-name').value;
        const email = document.getElementById('u-email').value;
        const role = document.getElementById('u-role').value;
        await apiRequest('users/users', 'POST', {name, email, role});
        loadUsers();
    }
    
    async function deleteUser(id) {
        await apiRequest(`users/users/${id}`, 'DELETE');
        loadUsers();
    }

    // Products
    async function loadProducts() {
        const products = await apiRequest('products/products');
        const tbody = document.getElementById('products-tbody');
        tbody.innerHTML = '';
        products.forEach(p => {
            tbody.innerHTML += `<tr>
                <td>${p.id}</td><td>${p.name}</td><td>$${p.price}</td><td>${p.category}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Del</button></td>
            </tr>`;
        });
    }

    async function createProduct() {
        const name = document.getElementById('p-name').value;
        const price = parseFloat(document.getElementById('p-price').value);
        const category = document.getElementById('p-category').value;
        await apiRequest('products/products', 'POST', {name, price, category});
        loadProducts();
    }
    
    async function deleteProduct(id) {
        await apiRequest(`products/products/${id}`, 'DELETE');
        loadProducts();
    }

    // Orders
    async function loadOrders() {
        const orders = await apiRequest('orders/orders');
        const tbody = document.getElementById('orders-tbody');
        tbody.innerHTML = '';
        orders.forEach(o => {
            tbody.innerHTML += `<tr>
                <td>${o.id}</td><td>${o.user_id}</td><td>${o.product_id}</td><td>${o.quantity}</td><td>${o.status}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">Del</button></td>
            </tr>`;
        });
    }

    async function createOrder() {
        const user_id = parseInt(document.getElementById('o-userid').value);
        const product_id = parseInt(document.getElementById('o-productid').value);
        const quantity = parseInt(document.getElementById('o-qty').value);
        const status = document.getElementById('o-status').value;
        await apiRequest('orders/orders', 'POST', {user_id, product_id, quantity, status});
        loadOrders();
    }
    
    async function deleteOrder(id) {
        await apiRequest(`orders/orders/${id}`, 'DELETE');
        loadOrders();
    }

    // Initial load
    loadUsers();
</script>
</body>
</html>
